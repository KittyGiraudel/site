<div id="carbon-viz">
  <style>
  #carbon-viz {
    --viz-bg: #ffffff;
    --viz-fg: #0f172a;
    --viz-muted: #6b7280;
    --viz-border: #e5e7eb;
    --viz-accent: #2563eb;
    --viz-accent-soft: rgba(37, 99, 235, 0.05);
    --viz-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    font-family: sans-serif;
  }
  .chart-card {
    background: #ffffff;
    border-radius: 1rem;
    border: 1px solid #e5e7eb;
    padding: 1rem 1.2rem 1.1rem;
    position: relative;
    overflow: hidden;
    margin-bottom: var(--vb);
  }
  .chart-card::after { content: none; }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
    position: relative;
    z-index: 1;
  }
  @media (max-width: 600px) {
    .chart-header {
      flex-direction: column;
    }
  }
  .chart-title {
    font-size: 0.9rem;
    color: var(--viz-fg);
  }
  .chart-subtitle {
    font-size: 0.75rem;
    color: var(--viz-muted);
  }
  .summary-card {
    display: grid;
    gap: var(--vb-1\/2);
    align-content: flex-start;
    margin-bottom: var(--vb-1\/2);
  }
  .summary-title {
    font-size: 0.9rem;
    color: var(--viz-fg);
    margin-bottom: 0.2rem;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.6rem;
  }
  .summary-item {
    padding: 0.65rem 0.75rem;
    border-radius: 0.75rem;
    background: var(--viz-accent-soft);
    border: 1px solid #e5e7eb;
    font-size: 0.8rem;
  }
  .summary-label {
    color: var(--viz-muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.15rem;
  }
  .summary-value {
    font-weight: 600;
    color: var(--viz-fg);
    font-size: 0.95rem;
  }
  .range-toggle {
    display: inline-flex;
    gap: 0.35rem;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  @media (max-width: 600px) {
    .range-toggle {
      margin-top: var(--vb-1\/3);
      flex-wrap: wrap;
    }
  }
  .range-toggle button {
    border-radius: 999px;
    border: 1px solid #e5e7eb;
    background: #ffffff;
    color: var(--viz-muted);
    font-size: 0.7rem;
    padding: 0.18rem 0.6rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  .range-toggle button:is(:hover, :focus-visible) {
    border-color: var(--viz-accent);
    color: var(--viz-accent);
    background: rgba(37, 99, 235, 0.04);
  }
  .range-toggle button.is-active {
    background: rgba(37, 99, 235, 0.12);
    border-color: var(--viz-accent);
    color: #1d4ed8;
    font-weight: 600;
  }
  canvas {
    position: relative;
    z-index: 1;
    max-height: 320px;
  }
</style>

  <section class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">Monthly payouts (USD)</div>
        <div class="chart-subtitle" id="rangeLabel"></div>
      </div>
      <div class="range-toggle" aria-label="Time range" role="radiogroup">
        <button type="button" data-range="all" class="is-active">All</button>
        <button type="button" data-range="5y">Last 5y</button>
        <button type="button" data-range="3y">Last 3y</button>
        <button type="button" data-range="2y">Last 2y</button>
        <button type="button" data-range="1y">Last 1y</button>
      </div>
    </div>
    <canvas id="payoutsChart" aria-label="Monthly Carbon payouts for giraudel.com" role="img"></canvas>
  </section>

  <section class="summary-card">
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">Total for period</div>
        <div class="summary-value" id="totalValue">$0.00</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Months tracked</div>
        <div class="summary-value" id="monthsValue">0</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Best month</div>
        <div class="summary-value" id="bestMonthValue">–</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Average / month</div>
        <div class="summary-value" id="avgValue">$0.00</div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

      { year: 2025, monAbbr: 'Dec', amount:  3.33372527 },

      { year: 2026, monAbbr: 'Jan', amount:  1.50129623 }
    ];

    function filterEntries(range) {
      if (range === 'all') return allEntries.slice();
      if (!allEntries.length) return [];

      // Trailing N×12 months based on the latest month in the data.
      const last = allEntries[allEntries.length - 1];
      const lastMonthIndex = monthOrder.indexOf(last.monAbbr);
      const lastAbsolute = last.year * 12 + lastMonthIndex;

      let yearsWindow = 0;
      if (range === '5y') yearsWindow = 5;
      if (range === '3y') yearsWindow = 3;
      if (range === '2y') yearsWindow = 2;
      if (range === '1y') yearsWindow = 1;
      if (!yearsWindow) return allEntries.slice();

      const monthsWindow = yearsWindow * 12;
      const minAbsolute = lastAbsolute - (monthsWindow - 1);

      return allEntries.filter(e => {
        const idx = e.year * 12 + monthOrder.indexOf(e.monAbbr);
        return idx >= minAbsolute;
      });
    }

    function entriesToLabels(entries) {
      return entries.map(e => {
        const idx = monthOrder.indexOf(e.monAbbr);
        const m = String(idx + 1).padStart(2, '0');
        return `${e.year}-${m}`;
      });
    }

    function updateRangeLabel(entries) {
      const el = document.getElementById('rangeLabel');
      if (!el) return;
      if (!entries.length) {
        el.textContent = 'No data';
        return;
      }
      const first = entries[0];
      const last = entries[entries.length - 1];
      const firstLabel = `${first.monAbbr} ${first.year}`;
      const lastLabel = `${last.monAbbr} ${last.year}`;
      el.textContent = firstLabel === lastLabel
        ? firstLabel
        : `${firstLabel} → ${lastLabel}`;
    }

    function updateSummary(entries, labels) {
      const values = entries.map(e => e.amount);
      const total = values.reduce((s, v) => s + v, 0);
      const avg = values.length ? total / values.length : 0;
      const bestIndex = values.length
        ? values.reduce((bestI, v, i) => (v > values[bestI] ? i : bestI), 0)
        : -1;
      const bestLabel = bestIndex >= 0 ? labels[bestIndex] : '–';
      const bestValue = bestIndex >= 0 ? values[bestIndex] : 0;

      document.getElementById('totalValue').textContent =
        `$${total.toFixed(2)}`;
      document.getElementById('monthsValue').textContent =
        `${values.length}`;
      document.getElementById('avgValue').textContent =
        `$${avg.toFixed(2)}`;
      document.getElementById('bestMonthValue').textContent =
        `${bestLabel} · $${bestValue.toFixed(2)}`;

      return values;
    }

    const ctx = document.getElementById('payoutsChart').getContext('2d');
    const initialEntries = filterEntries('all');
    const initialLabels = entriesToLabels(initialEntries);
    updateRangeLabel(initialEntries);
    const initialValues = updateSummary(initialEntries, initialLabels);

    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: initialLabels,
        datasets: [{
          label: 'Payout (USD)',
          data: initialValues,
          borderRadius: 6,
          backgroundColor: 'rgb(56 189 248 / 0.8)',
          borderColor: 'rgb(56 189 248 / 0.9)',
          borderWidth: 1.5,
          maxBarThickness: 22
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `$${ctx.parsed.y.toFixed(2)}`
            }
          }
        },
        scales: {
          x: {
            ticks: {
              maxRotation: 0,
              minRotation: 0,
              color: '#9ca3af',
              autoSkip: true,
              maxTicksLimit: 10
            },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: {
              color: '#9ca3af',
              callback: v => `$${v}`
            },
            grid: {
              color: 'rgb(55 65 81 / 0.3)',
              zeroLineColor: 'rgb(156 163 175 / 0.8)'
            }
          }
        }
      }
    });

    document.querySelectorAll('.range-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        const range = btn.getAttribute('data-range');
        document
          .querySelectorAll('.range-toggle button')
          .forEach(b => b.classList.toggle('is-active', b === btn));

        const filtered = filterEntries(range);
        const labels = entriesToLabels(filtered);
        const values = updateSummary(filtered, labels);
        updateRangeLabel(filtered);

        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.update();
      });
    });
  </script>
</div>
