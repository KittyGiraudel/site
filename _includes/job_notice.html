{% assign label = label | default: "Heads up!" %}
{% assign wrapper_class = class | default: "Tile" %}
<div class="{{ wrapper_class }}"{% if style %} style="{{ style }}"{% endif %}>
  <p style="margin: 0"><strong>{{ label }}</strong> {{ site.jobNotice.text }}<br><a href="{{ site.jobNotice.url }}" rel="noopener noreferrer">Read more on LinkedIn</a>. ✨</p>
</div>
