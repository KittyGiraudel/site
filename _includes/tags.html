{% if tags.size > 0 %}
<ul class="Tags">
  {%- for tag in tags | sort %}
  {% assign name = tag.name | default: tag %}
  <li class="Tag">
    <a class="Tag__link no-background" href="/tags/{{ name | slugify }}" {% if tag.extra %}data-extra="{{ tag.extra }}" {% endif %}>
      {{ name }}<span class="visually-hidden"> tag</span>
    </a>
  </li>
  {% endfor %}
</ul>
{% endif %}
