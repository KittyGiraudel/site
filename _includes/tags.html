{% if tags %}
<ul class="Tags">
  {% for tag in tags | sort %}
    {% assign name = tag.name | default: tag %}
    {% assign extra = tag.extra %}
    {% if tag != "posts" %}
      <li class="Tag">
        <a class="Tag__link" href="/tags/{{ name | slugify }}"
        {% if extra %}data-extra="{{ extra }}"{% endif %}>{{ name }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>
{% endif %}
